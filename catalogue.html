<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalogue — Reta Peptide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #1C2B3A; --gold: #C8A96E; --ivory: #F0EBE1; --bg: #FAFAF8; --border: rgba(28,43,58,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); font-family:'DM Sans',sans-serif; }
    nav { 
        position:fixed; top:0; width:100%; height:64px; background:white;
        display:flex; align-items:center; justify-content:space-between; padding:0 5%;
        border-bottom:1px solid var(--border); z-index:200;
    }
    .logo { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; text-transform:uppercase; color:var(--navy); }
    .nav-links a { margin-left:25px; text-decoration:none; color:rgba(0,0,0,0.5); font-size:0.75rem; text-transform:uppercase; }
    
    .header { padding:120px 5% 60px; background:var(--navy); color:white; text-align:center; }
    .header h1 { font-family:'Cormorant Garamond',serif; font-size:3rem; }

    .product-grid { padding:60px 5%; max-width:1200px; margin:0 auto; }
    .product-card { background:white; border:1px solid var(--border); display:grid; grid-template-columns:300px 1fr; overflow:hidden; }
    .product-visual { background:var(--navy); display:flex; align-items:center; justify-content:center; padding:40px; }
    .product-content { padding:40px; }
    .product-name { font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--navy); margin-bottom:10px; }
    .price { font-size:1.5rem; color:var(--gold); font-weight:700; margin:20px 0; }
    .btn-buy { background:var(--navy); color:white; padding:12px 30px; text-decoration:none; display:inline-block; text-transform:uppercase; font-size:0.8rem; font-weight:700; }

    @media(max-width:800px) { .product-card { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">RETA PEPTIDE</div>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="catalogue.html" style="color:var(--navy); font-weight:700;">Catalogue</a>
    </div>
  </nav>

  <div class="header">
    <h1>Catalogue Scientifique</h1>
    <p>Formules de recherche premium certifiées GMP.</p>
  </div>

  <div class="product-grid">
    <div class="product-card">
      <div class="product-visual">
        <div style="width:60px; height:120px; border:2px solid var(--gold); border-radius:5px; position:relative;">
            <div style="position:absolute; bottom:0; width:100%; height:40%; background:rgba(200,169,110,0.3);"></div>
        </div>
      </div>
      <div class="product-content">
        <div style="font-family:'DM Mono',monospace; color:var(--gold); font-size:0.7rem; text-transform:uppercase;">En Stock</div>
        <h2 class="product-name">5-Amino-1MQ</h2>
        <p>Inhibiteur NNMT sélectif conçu pour la recherche sur le métabolisme énergétique et l'optimisation du NAD⁺.</p>
        <div class="price">69,00€</div>
        <a href="index.html#offre" class="btn-buy">Commander la formule →</a>
      </div>
    </div>
  </div>
</body>
</html>
